desc:
  env: development
  brand: ''
  partOf: ''
  project: ''

serviceAccount:
  name: ''

cache:
  name: redis
  version: 7.4.1
  alpine: "alpine3.20"
  usePVC: "false"
  args:
    - "--save"
    - "3600 1 300 15 60 1000"
    - "--maxmemory"
    - "1900mb"
    - "--maxmemory-policy"
    - "volatile-ttl"
  port: 6379
  metricsPort: 9121
  requests:
    cpu: 200m
    memory: 2Gi
  limits:
    cpu: 200m
    memory: 2Gi
  volume:
    size: 3Gi

exporter:
  requests:
    cpu: 100m
    memory: 100Mi
  limits:
    cpu: 100m
    memory: 100Mi
